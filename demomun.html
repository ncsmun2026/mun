<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCS Model United Nations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% -10%, #10202f 0%, #060d15 55%, #04090f 100%);
      color: #f5f0e6;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      padding: 52px 20px 36px;
    }

    .page {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* share button */
    .share-btn {
      position: absolute;
      top: -8px;
      right: 0;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f0e6;
      cursor: pointer;
      transition: 0.2s;
      padding: 0;
    }

    .share-btn:hover {
      border-color: rgba(255, 255, 255, 0.8);
    }

    .share-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* logo */
    .logo-wrap {
      position: relative;
      width: 118px;
      height: 118px;
      margin: 6px 0 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-glow {
      position: absolute;
      inset: -22px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 209, 197, 0.32), transparent 70%);
      filter: blur(4px);
    }

    .logo-circle {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* ensures image stays inside circle */
    }

    .logo-circle img {
      width: 80%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* title & date */
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(21px, 5.5vw, 27px);
      text-align: center;
      line-height: 1.35;
      padding: 0 6px;
    }

    .dates {
      font-weight: 700;
      letter-spacing: 3px;
      font-size: 13.5px;
      color: rgba(245, 240, 230, 0.6);
      margin: 10px 0 8px;
    }

    /* COUNTDOWN */
    .countdown-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 6px 0 26px;
    }

    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 58px;
      padding: 12px 4px 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
      transition: border-color 0.2s;
    }

    .cd-item:hover {
      border-color: rgba(255, 255, 255, 0.5);
    }

    .cd-number {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.1;
      color: #eccd8c;
      letter-spacing: 1px;
    }

    .cd-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(245, 240, 230, 0.5);
      margin-top: 4px;
    }

    .countdown-ended {
      display: none;
      font-weight: 600;
      font-size: 15px;
      color: #eccd8c;
      margin: 6px 0 26px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 26px;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.03);
      text-decoration: none;
      color: #f5f0e6;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.4);
    }

    .link-btn .icon {
      flex-shrink: 0;
      width: 23px;
      height: 23px;
    }

    .link-btn .icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-btn .text {
      flex: 1;
      min-width: 0;
    }

    .link-btn .title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
      display: block;
    }

    .link-btn .subtitle {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(245, 240, 230, 0.6);
      margin-top: 3px;
    }

    .link-btn .chevron {
      flex-shrink: 0;
      width: 17px;
      height: 17px;
      opacity: 0.45;
      transition: 0.25s;
    }

    .link-btn .chevron svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-btn:hover .chevron {
      opacity: 1;
      transform: translateX(3px);
    }

    .link-btn.register {
      background: linear-gradient(135deg, #eccd8c, #c99b3f);
      border: none;
      color: #0a141f;
    }

    .link-btn.register .subtitle {
      color: rgba(10, 20, 31, 0.65);
    }

    .link-btn.register:hover {
      box-shadow: 0 10px 30px rgba(201, 155, 63, 0.45);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .links a:nth-child(1) { animation-delay: 0.05s; }
    .links a:nth-child(2) { animation-delay: 0.12s; }
    .links a:nth-child(3) { animation-delay: 0.19s; }
    .links a:nth-child(4) { animation-delay: 0.26s; }
    .links a:nth-child(5) { animation-delay: 0.33s; }

    /* socials */
    .socials {
      margin: 38px 0 16px;
      display: flex;
      gap: 14px;
    }

    .socials a {
      width: 42px;
      height: 42px;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f0e6;
      text-decoration: none;
      transition: 0.2s;
    }

    .socials a:hover {
      border-color: rgba(255, 255, 255, 0.8);
    }

    .socials svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    footer {
      font-size: 11.5px;
      color: rgba(245, 240, 230, 0.6);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #fff;
      color: #0a141f;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 460px) {
      .cd-item {
        min-width: 48px;
        padding: 10px 2px 6px;
      }
      .cd-number {
        font-size: 22px;
      }
      .cd-label {
        font-size: 9px;
        letter-spacing: 1px;
      }
      .countdown-wrap {
        gap: 8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- share -->
  <button class="share-btn" onclick="copyLink()" aria-label="Copy link">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
  </button>

  <!-- logo -->
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-circle">
      <!-- 
        Place your logo image file (e.g., logo.png, logo.jpg, logo.svg) 
        in the same folder as this HTML file and name it "logo" 
        (with the proper extension). Update the src below accordingly.
      -->
      <img src="logo.png" alt="NCS Model United Nations Logo" />
    </div>
  </div>

  <!-- title & date -->
  <h1>NCS Model United Nations</h1>
  <p class="dates">OCT 6 &nbsp;|&nbsp; 7 &nbsp;|&nbsp; 8</p>

  <!-- COUNTDOWN -->
  <div class="countdown-wrap" id="countdownWrap">
    <div class="cd-item">
      <span class="cd-number" id="cdDays">00</span>
      <span class="cd-label">Days</span>
    </div>
    <div class="cd-item">
      <span class="cd-number" id="cdHours">00</span>
      <span class="cd-label">Hours</span>
    </div>
    <div class="cd-item">
      <span class="cd-number" id="cdMinutes">00</span>
      <span class="cd-label">Mins</span>
    </div>
    <div class="cd-item">
      <span class="cd-number" id="cdSeconds">00</span>
      <span class="cd-label">Secs</span>
    </div>
  </div>
  <div class="countdown-ended" id="countdownEnded">🎉 The conference has begun!</div>

  <!-- links -->
  <div class="links">

    <!-- REGISTER -->
    <a class="link-btn register" href="#" target="_blank" rel="noopener noreferrer">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg></span>
      <span class="text">
        <span class="title">Register Now</span>
        <span class="subtitle">Google Form</span>
      </span>
      <span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
    </a>

    <!-- VENUE -->
    <a class="link-btn" href="https://www.google.com/maps/search/?api=1&amp;query=PRG9%2BX5C,+Taxila" target="_blank" rel="noopener noreferrer">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></span>
      <span class="text">
        <span class="title">Venue</span>
        <span class="subtitle">📍 PRG9+X5C, Taxila</span>
      </span>
      <span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
    </a>

    <!-- COUNTRY MATRIX -->
    <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
      <span class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
      <span class="text">
        <span class="title">Country Matrix</span>
        <span class="subtitle">Excel spreadsheet</span>
      </span>
      <span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
    </a>

    <!-- STUDY GUIDES -->
    <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></span>
      <span class="text">
        <span class="title">Study Guides</span>
        <span class="subtitle">Google Drive folder</span>
      </span>
      <span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
    </a>

    <!-- TERMS & CONDITIONS -->
    <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg></span>
      <span class="text">
        <span class="title">Terms &amp; Conditions</span>
        <span class="subtitle">Google Doc</span>
      </span>
      <span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
    </a>

  </div>

  <!-- socials -->
  <div class="socials">
    <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line></svg>
    </a>
  </div>

  <footer>NCS Model United Nations &middot; 2026</footer>
</div>

<!-- toast -->
<div class="toast" id="toast">Link copied!</div>

<script>
  // ----- copy link -----
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(function() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    });
  }

  // ----- COUNTDOWN -----
  (function() {
    const targetDate = new Date(2026, 9, 6, 0, 0, 0).getTime();

    const daysEl = document.getElementById('cdDays');
    const hoursEl = document.getElementById('cdHours');
    const minutesEl = document.getElementById('cdMinutes');
    const secondsEl = document.getElementById('cdSeconds');
    const countdownWrap = document.getElementById('countdownWrap');
    const endedMsg = document.getElementById('countdownEnded');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateCountdown() {
      const now = Date.now();
      let diff = targetDate - now;

      if (diff <= 0) {
        countdownWrap.style.display = 'none';
        endedMsg.style.display = 'block';
        return;
      }

      countdownWrap.style.display = 'flex';
      endedMsg.style.display = 'none';

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff -= days * (1000 * 60 * 60 * 24);
      const hours = Math.floor(diff / (1000 * 60 * 60));
      diff -= hours * (1000 * 60 * 60);
      const minutes = Math.floor(diff / (1000 * 60));
      diff -= minutes * (1000 * 60);
      const seconds = Math.floor(diff / 1000);

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  })();
</script>
</body>
</html>
